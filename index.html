<body>
<div class="app">
    <button class="floating-back" id="floatingBackBtn">⬅ 返回列表</button>

    <div class="header">
        <h1 id="pageTitle">📋 客户列表</h1>
        <div class="btn-group">
            <button class="btn" id="switchBtn">📂 管理</button>
        </div>
    </div>
    <div id="listView">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="输入投保人或被保人姓名…" autofocus>
        </div>
        <div class="result-count" id="resultCount"></div>
        <div id="customerList"></div>
    </div>
    <div id="detailView" class="hidden">
        <button class="btn outline back-btn" id="backToListBtn">⬅ 返回列表</button>
        <div id="detailContent"></div>
    </div>
    <div id="adminView" class="hidden">
        <div class="admin-toolbar">
            <button id="addClientBtn">➕ 新增客户</button>
            <button id="importDataBtn">📥 导入表格</button>
            <button id="exportDataBtn" class="secondary">📤 导出JSON</button>
            <button id="restoreDataBtn" class="secondary">📥 恢复JSON</button>
            <button id="linkFileBtn" class="file-btn">📎 关联文件</button>
            <button id="refreshAdminBtn" class="secondary">🔄 刷新</button>
            <button id="backToListFromAdmin" class="secondary">⬅ 返回</button>
        </div>
        <!-- 新增云端配置区域 -->
        <div class="cloud-config">
            <div class="title">☁️ 云端备份（JSONBin）</div>
            <div class="row">
                <label>Bin ID</label>
                <input id="cloudBinId" placeholder="例如 5f9e8d7c6b5a4e3d2c1b0a9f">
            </div>
            <div class="row">
                <label>Secret Key</label>
                <input id="cloudSecretKey" placeholder="您的 Secret Key" type="password">
            </div>
            <div class="row">
                <button id="cloudEnableBtn">启用自动同步</button>
                <button id="cloudSyncBtn" class="secondary">🔄 立即同步</button>
            </div>
            <div class="status" id="cloudStatus">状态：未连接</div>
        </div>
        <div id="adminClientList"></div>
    </div>
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modalContent">
            <span class="close" id="modalClose">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>
    <div class="footer-tip">
        <span>数据保存在本地 · 共 <span id="totalPoliciesFooter">0</span> 条保单</span>
        <span class="file-status" id="fileStatus">未关联外部文件</span>
        <span class="update-time" id="updateTime">最后保存：无</span>
        <span id="cloudStatusFooter"></span>
    </div>
</div>

<script>
    // ============================================================
    // 数据层（完整 v24）
    // ============================================================
    const STORAGE_KEY = 'policy_manager_v24';
    const UPDATE_TIME_KEY = 'policy_manager_last_update';
    const CLOUD_BIN_KEY = 'policy_cloud_bin';
    const CLOUD_SECRET_KEY = 'policy_cloud_secret';

    let fileHandle = null;
    let cloudEnabled = false;
    let cloudBinId = '';
    let cloudSecretKey = '';

    // 加载云端配置
    function loadCloudConfig() {
        cloudBinId = localStorage.getItem(CLOUD_BIN_KEY) || '';
        cloudSecretKey = localStorage.getItem(CLOUD_SECRET_KEY) || '';
        if (cloudBinId && cloudSecretKey) {
            cloudEnabled = true;
            document.getElementById('cloudBinId').value = cloudBinId;
            document.getElementById('cloudSecretKey').value = cloudSecretKey;
            updateCloudStatusUI(true);
        } else {
            cloudEnabled = false;
            updateCloudStatusUI(false);
        }
    }

    function saveCloudConfig(binId, secret) {
        localStorage.setItem(CLOUD_BIN_KEY, binId);
        localStorage.setItem(CLOUD_SECRET_KEY, secret);
        cloudBinId = binId;
        cloudSecretKey = secret;
        cloudEnabled = true;
        updateCloudStatusUI(true);
    }

    function clearCloudConfig() {
        localStorage.removeItem(CLOUD_BIN_KEY);
        localStorage.removeItem(CLOUD_SECRET_KEY);
        cloudEnabled = false;
        cloudBinId = '';
        cloudSecretKey = '';
        updateCloudStatusUI(false);
    }

    function updateCloudStatusUI(connected) {
        const statusEl = document.getElementById('cloudStatus');
        const footerEl = document.getElementById('cloudStatusFooter');
        if (connected) {
            statusEl.innerHTML = '状态：<span class="connected">☁️ 已连接</span>';
            footerEl.textContent = '☁️ 已同步云端';
            footerEl.style.color = '#16a34a';
        } else {
            statusEl.innerHTML = '状态：<span class="disconnected">未连接</span>';
            footerEl.textContent = '';
        }
    }

    // 云端读写函数
      // 重写 syncToCloud 支持重试
    async function syncToCloud(data, retryCount = 0) {
        if (!cloudEnabled) return;
        const maxRetries = 3;
        try {
            const url = `https://api.jsonbin.io/v3/b/${cloudBinId}`;
            const response = await fetch(url, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Master-Key': cloudSecretKey
                },
                body: JSON.stringify(data)
            });
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            console.log('✅ 云端同步成功');
            // 如果之前是禁用状态，恢复启用
            if (!cloudEnabled) {
                cloudEnabled = true;
                updateCloudStatusUI(true);
            }
            return true;
        } catch (e) {
            console.warn(`❌ 云端同步失败 (尝试 ${retryCount + 1}/${maxRetries}):`, e);
            if (retryCount < maxRetries - 1) {
                // 延迟后重试（指数退避）
                await new Promise(resolve => setTimeout(resolve, 1000 * (retryCount + 1)));
                return syncToCloud(data, retryCount + 1);
            } else {
                // 重试失败，仅显示警告，不禁用同步，避免永久禁用
                console.warn('❌ 云端同步多次失败，请稍后手动同步。');
                // 可选：仍然显示连接状态，但不自动禁用
                return false;
            }
        }
    }

    // 重写 saveData（增加同步状态保持）
    function saveData(customers) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(customers));
        const now = new Date().toISOString().replace('T', ' ').slice(0, 19);
        localStorage.setItem(UPDATE_TIME_KEY, now);
        updateFooterTime(now);
        if (fileHandle) {
            writeToFile(customers).catch(err => {
                console.warn('写入关联文件失败:', err);
                fileHandle = null;
                updateFileStatus();
            });
        }
        // 始终尝试同步，但不再因失败禁用云端
        if (cloudEnabled) {
            syncToCloud(customers);
        } else {
            // 如果云端被禁用了，但配置存在，尝试重新启用
            const binId = localStorage.getItem(CLOUD_BIN_KEY);
            const secret = localStorage.getItem(CLOUD_SECRET_KEY);
            if (binId && secret) {
                // 尝试重新启用（不自动启用，等待用户操作或手动同步）
                // 这里我们可以在下次 saveData 时检测并尝试恢复，但为了避免意外，还是让用户手动点击“启用”或“立即同步”
                // 所以这里不做自动启用，留给用户操作。
            }
        }
    }

    // 从云端恢复
    async function restoreFromCloud() {
        if (!cloudEnabled) {
            alert('请先启用云端自动同步。');
            return;
        }
        try {
            const data = await fetchFromCloud();
            if (data && Array.isArray(data) && data.length > 0) {
                if (!confirm(`云端有 ${data.length} 位客户数据，将覆盖本地当前数据，确定吗？`)) return;
                saveData(data);
                refreshData();
                alert(`✅ 已从云端恢复 ${data.length} 位客户数据。`);
            } else {
                alert('云端暂无数据或数据为空。');
            }
        } catch (e) {
            alert('从云端恢复失败：' + e.message);
        }
    }

    // 自动同步（页面加载时调用）
    async function autoSyncOnLoad() {
        if (!cloudEnabled) return;
        try {
            const cloudData = await fetchFromCloud();
            if (!cloudData || !Array.isArray(cloudData)) return;
            const localData = loadData();
            if (localData.length === 0) {
                saveData(cloudData);
                refreshData();
                console.log('📥 已从云端加载数据（本地为空）');
            } else if (cloudData.length > 0 && cloudData.length !== localData.length) {
                if (confirm(`云端有 ${cloudData.length} 位客户，本地有 ${localData.length} 位客户。是否用云端数据覆盖本地？`)) {
                    saveData(cloudData);
                    refreshData();
                }
            }
        } catch (e) {
            console.warn('自动同步失败:', e);
        }
    }

    async function linkFile() {
        try {
            if (!('showOpenFilePicker' in window)) {
                alert('您的浏览器不支持 File System Access API（需要 Chrome 86+ 或 Edge 86+）。\n请使用 Chrome 或 Edge 浏览器，或手动使用“导出JSON”和“恢复JSON”功能。');
                return;
            }
            const [handle] = await window.showOpenFilePicker({
                types: [{ description: 'JSON 文件', accept: { 'application/json': ['.json'] } }],
                excludeAcceptAllOption: true,
                multiple: false
            });
            const currentData = loadData();

                if (!confirm('当前已有数据，是否将文件内容加载到系统？\n（选择“确定”将用文件内容覆盖当前数据；选择“取消”则仅关联文件，不覆盖数据）')) {
                    fileHandle = handle;
                    updateFileStatus(true);
                    alert('✅ 已关联文件，之后所有修改将自动写入该文件。');
                    return;
                }
            }
            const file = await handle.getFile();
            const text = await file.text();
            let data;
            try {
                data = JSON.parse(text);
                if (!Array.isArray(data)) throw new Error('文件内容不是数组格式');
                if (data.length > 0 && (!data[0].name || !data[0].policies)) {
                    throw new Error('文件格式不正确，缺少 "name" 或 "policies" 字段');
                }
            } catch (err) {
                alert('读取文件失败：' + err.message);
                return;
            }
            fileHandle = handle;
            saveData(data);
            refreshData();
            updateFileStatus(true);
            alert(`✅ 成功加载 ${data.length} 位客户，已关联文件。`);
        } catch (err) {
            if (err.name !== 'AbortError') {
                alert('关联文件失败：' + err.message);
            }
        }
    }

    // 工具函数
    function calculateAge(idCard) {
        if (!idCard || idCard.length < 18) return null;
        const birth = idCard.substring(6, 14);
        const year = parseInt(birth.substring(0, 4));
        const month = parseInt(birth.substring(4, 6)) - 1;
        const day = parseInt(birth.substring(6, 8));
        const birthDate = new Date(year, month, day);
        const today = new Date();
        let age = today.getFullYear() - birthDate.getFullYear();
        const m = today.getMonth() - birthDate.getMonth();
        if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
            age--;
        }
        return age >= 0 ? age : null;
    }

    function formatDate(ymd) {
        if (!ymd || ymd.length !== 8) return ymd || '缺失';
        const year = ymd.substring(0,4);
        const month = parseInt(ymd.substring(4,6));
        const day = parseInt(ymd.substring(6,8));
        return `${year}年${month}月${day}日`;
    }

    function calculateElapsedYears(ymd) {
        if (!ymd || ymd.length !== 8) return null;
        const year = parseInt(ymd.substring(0,4));
        const month = parseInt(ymd.substring(4,6)) - 1;
        const day = parseInt(ymd.substring(6,8));
        const start = new Date(year, month, day);
        const now = new Date();
        let years = now.getFullYear() - start.getFullYear();
        const m = now.getMonth() - start.getMonth();
        if (m < 0 || (m === 0 && now.getDate() < start.getDate())) {
            years--;
        }
        return years;
    }

    function isClientComplete(client) {
        return !!(client.idCard && client.phone && client.address);
    }

    function isPolicyComplete(policy) {
        return !!(policy.insuranceName || policy.policyCode) && policy.effectiveDate && policy.annualPremium;
    }

    function validatePolicyDetails(policy, client) {
        const errors = [];
        const insuredId = policy.insuredId || '';
        if (!insuredId || insuredId.trim() === '') {
            errors.push('被保人身份证缺失');
        } else if (!/^\d{17}[\dXx]$/.test(insuredId.trim())) {
            errors.push('被保人身份证格式错误（应为18位，最后一位可为X）');
        }
        const phone = policy.insuredPhone || '';
        if (!phone || phone.trim() === '') {
            errors.push('被保人手机号缺失');
        } else if (!/^\d{11}$/.test(phone.trim())) {
            errors.push('被保人手机号格式错误（应为11位数字）');
        }
        const address = client.address || '';
        if (!address || address.trim() === '') {
            errors.push('投保人通信地址缺失（被保人联系地址未填写）');
        }
        return errors;
    }

    // 解析表格（导入）
    function parseTable(text) {
        const lines = text.split('\n').filter(line => line.trim() !== '');
        if (lines.length < 2) return [];
        const headerLine = lines[0];
        let headers = headerLine.split('|').map(s => s.trim()).filter(s => s !== '');
        if (headers.length === 0) {
            headers = headerLine.split('\t').map(s => s.trim()).filter(s => s !== '');
        }
        if (headers.length === 0) {
            throw new Error('无法识别分隔符，请使用竖线 | 或制表符。');
        }
        const nameIndex = headers.findIndex(h => h.replace(/\s/g, '') === '投保人姓名');
        if (nameIndex === -1) {
            const alt = headers.find(h => h.includes('姓名') || h.includes('投保人'));
            if (alt) {
                throw new Error(`未找到"投保人姓名"，但找到"${alt}"，请将列名统一为"投保人姓名"。`);
            } else {
                throw new Error('表头缺少"投保人姓名"列。');
            }
        }
        const colMap = {};
        headers.forEach((h, idx) => {
            const key = h.replace(/\s/g, '');
            colMap[key] = idx;
        });
        const rows = [];
        for (let i = 1; i < lines.length; i++) {
            let cells = lines[i].split('|').map(s => s.trim());
            if (cells.length === 1 && cells[0] === lines[i]) {
                cells = lines[i].split('\t').map(s => s.trim());
            }
            while (cells.length < headers.length) cells.push('');
            const row = {};
            for (let key in colMap) {
                const idx = colMap[key];
                const origHeader = headers[idx];
                row[origHeader] = cells[idx] || '';
            }
            rows.push(row);
        }
        return rows;
    }

    function resolveFormulas(data) {
        const colMap = { 'A': '投保人姓名', 'B': '投保人身份证号', 'C': '联系电话', 'E': '通信地址', 'F': '保单代码', 'G': '险种代码' };
        data.forEach(row => {
            for (let key in row) {
                let val = row[key];
                if (typeof val === 'string' && /^=([A-Z])\d+$/.test(val)) {
                    const match = val.match(/^=([A-Z])\d+$/);
                    const letter = match[1];
                    const targetKey = colMap[letter];
                    if (targetKey && row[targetKey] !== undefined) {
                        row[key] = row[targetKey];
                    }
                }
            }
        });
        return data;
    }

    function importDataFromText(rawText) {
        const rows = parseTable(rawText);
        if (rows.length === 0) throw new Error('未能解析出数据行，请检查是否包含表头。');
        const firstRow = rows[0];
        const nameKey = Object.keys(firstRow).find(k => k.replace(/\s/g, '') === '投保人姓名');
        if (!nameKey) throw new Error('数据中缺少"投保人姓名"列。');
        const resolved = resolveFormulas(rows);
        const valid = resolved.filter(row => (row[nameKey] || '').trim() !== '');
        if (valid.length === 0) throw new Error('没有找到有效的投保人数据。');
        const map = new Map();
        valid.forEach(p => {
            const name = p[nameKey].trim();
            if (!map.has(name)) map.set(name, []);
            map.get(name).push(p);
        });
        const allKeys = Object.keys(firstRow);
        const idKey = allKeys.find(k => k.replace(/\s/g, '') === '投保人身份证号');
        const phoneKey = allKeys.find(k => k.replace(/\s/g, '') === '联系电话');
        const addrKey = allKeys.find(k => k.replace(/\s/g, '') === '通信地址');
        const policyCodeKey = allKeys.find(k => k.replace(/\s/g, '') === '保单代码');
        const insNameKey = allKeys.find(k => k.replace(/\s/g, '') === '险种名称');
        const mainTypeKey = allKeys.find(k => k.replace(/\s/g, '') === '主险');
        const statusKey = allKeys.find(k => k.replace(/\s/g, '') === '保单状态');
        const effKey = allKeys.find(k => k.replace(/\s/g, '') === '生效日');
        const payKey = allKeys.find(k => k.replace(/\s/g, '') === '缴费方式');
        const premiumKey = allKeys.find(k => k.replace(/\s/g, '') === '年缴保费（元）');
        const termKey = allKeys.find(k => k.replace(/\s/g, '') === '缴费期限（年）');
        const insuredKey = allKeys.find(k => k.replace(/\s/g, '') === '被保险人');
        // 不再读取 insuredRelation
        const insuredIdKey = allKeys.find(k => k.replace(/\s/g, '') === '被保人身份证');
        const insuredPhoneKey = allKeys.find(k => k.replace(/\s/g, '') === '被保人手机号码');
        const beneKey = allKeys.find(k => k.replace(/\s/g, '') === '受益人');
        const remarkKey = allKeys.find(k => k.replace(/\s/g, '') === '备注');
        const codeTypeKey = allKeys.find(k => k.replace(/\s/g, '') === '险种代码');

        const customers = [];
        for (let [name, pols] of map) {
            let idCard = '', phone = '', address = '';
            for (let p of pols) {
                if (!idCard && idKey && p[idKey]) idCard = p[idKey].trim();
                if (!phone && phoneKey && p[phoneKey]) phone = p[phoneKey].trim();
                if (!address && addrKey && p[addrKey]) address = p[addrKey].trim();
            }
            const policies = pols.map(p => {
                let beneficiaries = [];
                const beneVal = (beneKey && p[beneKey]) ? p[beneKey].trim() : '';
                if (beneVal) {
                    const parts = beneVal.split('/').map(s => s.trim()).filter(s => s);
                    if (parts.length === 0 && beneVal) {
                        beneficiaries.push({ name: beneVal, quota: 100 });
                    } else {
                        const quota = Math.round(100 / parts.length);
                        parts.forEach((b, i) => {
                            beneficiaries.push({ name: b, quota: i === parts.length-1 ? 100 - quota*(parts.length-1) : quota });
                        });
                    }
                }
                return {
                    policyCode: policyCodeKey ? (p[policyCodeKey] || '') : '',
                    insuranceName: insNameKey ? (p[insNameKey] || '') : '',
                    codeType: codeTypeKey ? (p[codeTypeKey] || '') : '',
                    mainType: mainTypeKey ? (p[mainTypeKey] || '主险') : '主险',
                    status: statusKey ? (p[statusKey] || '') : '',
                    effectiveDate: effKey ? (p[effKey] || '') : '',
                    paymentMethod: payKey ? (p[payKey] || '年缴') : '年缴',
                    annualPremium: premiumKey ? (p[premiumKey] || '') : '',
                    paymentTerm: termKey ? (p[termKey] || '') : '',
                    insured: insuredKey ? (p[insuredKey] || '') : '',
                    insuredRelation: '',
                    insuredId: insuredIdKey ? (p[insuredIdKey] || '') : '',
                    insuredPhone: insuredPhoneKey ? (p[insuredPhoneKey] || '') : '',
                    beneficiaries: beneficiaries,
                    remark: remarkKey ? (p[remarkKey] || '') : '',
                    parentPolicyCode: '',
                    extraFields: {},
                    serviceRecords: []
                };
            });
            customers.push({ name, idCard, phone, address, policies, familyMembers: [], contactHistory: [] });
        }
        return customers;
    }

    // ----- History 管理 -----
    function pushHistory(view, data) {
        let hash = '#list';
        let state = { view: 'list' };
        if (view === 'detail') {
            hash = `#detail-${encodeURIComponent(data)}`;
            state = { view: 'detail', name: data };
        } else if (view === 'admin') {
            hash = '#admin';
            state = { view: 'admin' };
        } else {
            hash = '#list';
            state = { view: 'list' };
        }
        window.history.pushState(state, '', hash);
    }

    function replaceHistory(view, data) {
        let hash = '#list';
        let state = { view: 'list' };
        if (view === 'detail') {
            hash = `#detail-${encodeURIComponent(data)}`;
            state = { view: 'detail', name: data };
        } else if (view === 'admin') {
            hash = '#admin';
            state = { view: 'admin' };
        } else {
            hash = '#list';
            state = { view: 'list' };
        }
        window.history.replaceState(state, '', hash);
    }

    window.addEventListener('popstate', function(event) {
        const state = event.state;
        if (!state) {
            if (currentView !== 'list') {
                switchView('list');
                replaceHistory('list');
            }
            return;
        }
        if (state.view === 'list') {
            if (currentView !== 'list') switchView('list');
        } else if (state.view === 'detail') {
            const name = state.name;
            if (!name) { switchView('list'); replaceHistory('list'); return; }
            const client = getClient(name);
            if (!client) { switchView('list'); replaceHistory('list'); return; }
            showDetailDirect(name);
        } else if (state.view === 'admin') {
            if (currentView !== 'admin') switchView('admin');
        }
    });

    function initHistory() {
        const hash = window.location.hash;
        if (hash.startsWith('#detail-')) {
            const name = decodeURIComponent(hash.substring(8));
            const client = getClient(name);
            if (client) {
                replaceHistory('detail', name);
                showDetailDirect(name);
                return;
            }
        } else if (hash === '#admin') {
            replaceHistory('admin');
            switchView('admin');
            return;
        }
        replaceHistory('list');
        if (currentView !== 'list') switchView('list');
    }

    // ----- 列表渲染 -----
    function renderList() {
        const q = searchInput.value.trim().toLowerCase();
        let matched = [];
        if (q === '') {
            matched = currentData.slice();
        } else {
            matched = currentData.filter(c => {
                if (c.name.toLowerCase().includes(q)) return true;
                for (let p of c.policies) {
                    if (p.insured && p.insured.toLowerCase().includes(q)) return true;
                }
                return false;
            });
        }
        matched.sort((a, b) => {
            const aHistory = a.contactHistory || [];
            const bHistory = b.contactHistory || [];
            const aHas = aHistory.length > 0;
            const bHas = bHistory.length > 0;
            if (aHas !== bHas) return aHas ? 1 : -1;
            if (aHas && bHas) {
                const aDate = aHistory[aHistory.length - 1].date || '9999-99-99';
                const bDate = bHistory[bHistory.length - 1].date || '9999-99-99';
                return aDate.localeCompare(bDate);
            }
            return a.name.localeCompare(b.name);
        });

        if (matched.length === 0) {
            let emptyMsg = '📭 暂无客户数据';
            let subMsg = '请点击下方“管理”按钮，导入备份或新增客户。';
            if (q !== '') {
                emptyMsg = '🔍 未找到匹配的客户';
                subMsg = '请尝试其他关键词。';
            }
            customerList.innerHTML = `
                <div class="no-result">
                    <div>${emptyMsg}</div>
                    <div class="sub">${subMsg}</div>
                    ${q === '' ? `<button class="action-btn" onclick="document.getElementById('switchBtn').click()">前往管理</button>` : ''}
                </div>
            `;
            resultCount.textContent = '0 位客户';
            return;
        }

        resultCount.textContent = `共 ${matched.length} 位客户，总保单 ${matched.reduce((s,c) => s + c.policies.length, 0)} 条`;
        let html = '';
        matched.forEach(c => {
            const complete = isClientComplete(c);
            const age = calculateAge(c.idCard);
            const ageStr = age !== null ? `年龄 ${age} 岁` : '';
            const warnTag = !complete ? `<span class="tag" style="background:#fef3c7;color:#b45309;">⚠️ 信息不完整</span>` : '';
            const history = c.contactHistory || [];
            const latest = history.length > 0 ? history[history.length-1] : null;
            const contactDisplay = latest ? `${latest.status}（${latest.date}）` : '未记录';
            html += `<div class="customer-item" data-name="${c.name}">`;
            html += `<div class="info">`;
            html += `<div class="name">${c.name} ${warnTag}</div>`;
            html += `<div class="detail">`;
            const idDisplay = c.idCard ? c.idCard.substring(0,6)+'********'+c.idCard.substring(14) : '无身份证';
            html += `${idDisplay} · ${c.phone || '无电话'} · ${c.address || '无地址'}`;
            if (ageStr) html += ` · ${ageStr}`;
            html += ` · 保单 ${c.policies.length} 份 · 家庭成员 ${(c.familyMembers||[]).length} 人`;
            html += `</div>`;
            html += `<div class="contact-summary">📞 最新联系：${contactDisplay}</div>`;
            html += `</div>`;
            html += `<div class="badge">${c.policies.length}</div>`;
            html += `</div>`;
        });
        customerList.innerHTML = html;
        customerList.querySelectorAll('.customer-item').forEach(el => {
            el.addEventListener('click', () => {
                const name = el.dataset.name;
                showDetail(name);
            });
        });
    }

    // ----- 详情渲染 -----
    function renderDetail(name) {
        const client = getClient(name);
        if (!client) { detailContent.innerHTML = `<div class="no-result">客户不存在</div>`; return; }
        const age = calculateAge(client.idCard);
        const ageStr = age !== null ? `年龄 ${age} 岁` : '年龄未知';
        const complete = isClientComplete(client);
        const warnMsg = !complete ? '<div class="warning">⚠️ 客户信息不完整（缺少身份证/电话/地址）</div>' : '';
        const history = client.contactHistory || [];
        const options = ['已电话联系','面见客户','未联系上','已加微信','电话挂断'];

        let html = `<div class="detail-header">`;
        html += `<div class="name">${client.name}</div>`;
        html += `<div class="contact-area">`;
        html += `<div class="add-row">`;
        html += `<span class="label">📞 添加联系</span>`;
        html += `<select id="contactSelect">`;
        options.forEach(opt => { html += `<option value="${opt}">${opt}</option>`; });
        html += `</select>`;
        html += `<button class="record-btn" data-name="${client.name}">记录</button>`;
        html += `</div>`;
        html += `<div class="history-title">📋 历史记录</div>`;
        html += `<div class="history-list">`;
        if (history.length === 0) {
            html += `<div style="color:#94a3b8;padding:4px;">暂无记录</div>`;
        } else {
            const sorted = [...history].reverse();
            sorted.forEach(rec => {
                html += `<div class="h-item"><span>${rec.status}</span><span class="h-date">${rec.date}</span></div>`;
            });
        }
        html += `</div>`;
        html += `</div>`;
        html += `<div class="meta">`;
        if (client.idCard) html += `<span><span class="label">身份证</span> ${client.idCard}</span>`;
        if (client.phone) html += `<span><span class="label">电话</span> ${client.phone}</span>`;
        if (client.address) html += `<span><span class="label">地址</span> ${client.address}</span>`;
        html += `<span><span class="label">${ageStr}</span></span>`;
        html += `</div>`;
        html += warnMsg;
        html += `</div>`;

        // 家庭成员
        html += `<div class="family-section">`;
        html += `<div class="title">👨‍👩‍👧‍👦 家庭成员 <button class="btn outline" style="font-size:12px;padding:2px 10px;" id="addFamilyBtn">➕ 添加</button></div>`;
        const members = client.familyMembers || [];
        if (members.length === 0) {
            html += `<div style="font-size:13px;color:#94a3b8;">暂无家庭成员</div>`;
        } else {
            members.forEach((m, idx) => {
                html += `<div class="member-item">`;
                html += `<div class="info"><strong>${m.name}</strong>（${m.relationship}）`;
                if (m.idCard) html += ` · ${m.idCard}`;
                if (m.phone) html += ` · ${m.phone}`;
                if (m.note) html += ` · ${m.note}`;
                html += `</div>`;
                html += `<div class="actions">`;
                html += `<button class="edit-family" data-index="${idx}">编辑</button>`;
                html += `<button class="del-family" data-index="${idx}">删除</button>`;
                html += `</div>`;
                html += `</div>`;
            });
        }
        html += `</div>`;

        // 保单分组
        const mainPolicies = client.policies.filter(p => p.mainType === '主险');
        const subPolicies = client.policies.filter(p => p.mainType === '附加险');
        const subMap = {};
        subPolicies.forEach(sp => {
            const parentCode = sp.parentPolicyCode || '';
            if (!subMap[parentCode]) subMap[parentCode] = [];
            subMap[parentCode].push(sp);
        });
        const orphanSubs = subPolicies.filter(sp => !sp.parentPolicyCode || !mainPolicies.some(mp => mp.policyCode === sp.parentPolicyCode));

        html += `<div class="policy-list">`;
        if (mainPolicies.length === 0 && subPolicies.length === 0) {
            html += `<div class="no-result" style="padding:20px;">暂无保单</div>`;
        } else {
            mainPolicies.forEach(mp => {
                const subs = subMap[mp.policyCode] || [];
                html += `<div class="policy-group">`;
                html += `<div class="main-policy">`;
                html += `<div class="main-title"><span>📌 主险</span>`;
                if (subs.length > 0) {
                    html += `<span class="sub-count">包含 ${subs.length} 个附加险</span>`;
                } else {
                    html += `<span class="sub-count" style="background:#e2e8f0;color:#64748b;">无附加险</span>`;
                }
                html += `</div>`;
                html += renderPolicyItem(mp, client, true);
                html += `</div>`;
                if (subs.length > 0) {
                    html += `<div class="sub-policies">`;
                    subs.forEach(sp => {
                        const parentPolicy = mainPolicies.find(mp => mp.policyCode === sp.parentPolicyCode);
                        const parentDisplay = parentPolicy ? `${parentPolicy.policyCode}（${parentPolicy.insuranceName || '未命名'}）` : '未知';
                        html += `<div class="sub-policy-item">`;
                        html += `<div class="sub-title">🔗 关联主险：${parentDisplay}</div>`;
                        html += renderPolicyItem(sp, client, false);
                        html += `</div>`;
                    });
                    html += `</div>`;
                }
                html += `</div>`;
            });
            if (orphanSubs.length > 0) {
                html += `<div class="policy-group" style="border-color:#f59e0b;">`;
                html += `<div class="main-policy" style="background:#fef3c7;">`;
                html += `<div style="font-weight:600;color:#b45309;">⚠️ 未关联主险的附加险（请编辑关联）</div>`;
                html += `</div>`;
                html += `<div class="sub-policies">`;
                orphanSubs.forEach(sp => {
                    html += `<div class="sub-policy-item">`;
                    html += `<div class="sub-title" style="color:#b45309;">🔗 未关联主险</div>`;
                    html += renderPolicyItem(sp, client, false);
                    html += `</div>`;
                });
                html += `</div>`;
                html += `</div>`;
            }
        }
        html += `</div>`;

        detailContent.innerHTML = html;

        // 绑定联系记录
        detailContent.querySelector('.record-btn').addEventListener('click', function() {
            const name = this.dataset.name;
            const select = document.getElementById('contactSelect');
            const status = select.value;
            if (!confirm(`确认记录联系状态为“${status}”吗？`)) return;
            const clientObj = getClient(name);
            if (clientObj) {
                if (!clientObj.contactHistory) clientObj.contactHistory = [];
                const today = new Date().toISOString().slice(0,10);
                clientObj.contactHistory.push({ status, date: today });
                saveData(currentData);
                renderDetail(name);
            }
        });

        // 家庭成员
        document.getElementById('addFamilyBtn').addEventListener('click', () => openAddFamilyMember(name));
        detailContent.querySelectorAll('.edit-family').forEach(btn => {
            btn.addEventListener('click', () => {
                const idx = parseInt(btn.dataset.index);
                openEditFamilyMember(name, idx);
            });
        });
        detailContent.querySelectorAll('.del-family').forEach(btn => {
            btn.addEventListener('click', () => {
                const idx = parseInt(btn.dataset.index);
                if (confirm(`确定删除家庭成员 ${client.familyMembers[idx].name} 吗？`)) {
                    client.familyMembers.splice(idx, 1);
                    saveData(currentData);
                    renderDetail(name);
                }
            });
        });

        // 被保人关联
        detailContent.querySelectorAll('.link-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                const insuredName = this.dataset.insured || '';
                const insuredId = this.dataset.id || '';
                const insuredPhone = this.dataset.phone || '';
                if (!insuredName.trim()) {
                    alert('被保人姓名为空，无法关联，请先编辑保单填写被保人姓名。');
                    return;
                }
                const clientObj = getClient(name);
                if (clientObj) {
                    const exists = (clientObj.familyMembers || []).some(m => m.name === insuredName);
                    if (exists) {
                        alert(`家庭成员中已有 "${insuredName}"，无需重复添加。`);
                        return;
                    }
                }
                openAddFamilyMember(name, { name: insuredName, idCard: insuredId, phone: insuredPhone });
            });
        });

        // 保单编辑删除
        detailContent.querySelectorAll('.edit-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const name = btn.dataset.name;
                const idx = parseInt(btn.dataset.index);
                openEditPolicy(name, idx);
            });
        });
        detailContent.querySelectorAll('.del-policy-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const name = btn.dataset.name;
                const idx = parseInt(btn.dataset.index);
                const confirmText = prompt('请输入 "确认删除" 以确认删除该保单：');
                if (confirmText === '确认删除') {
                    deletePolicy(name, idx);
                } else {
                    alert('删除已取消');
                }
            });
        });

        setTimeout(bindServiceEvents, 0);
    }

    // ----- 渲染单笔保单 -----
    function renderPolicyItem(policy, client, isMain) {
        const idx = client.policies.indexOf(policy);
        const completePolicy = isPolicyComplete(policy);
        const status = policy.status || '';
        const statusTag = status ? `<span class="tag ${status}">${status}</span>` : '';
        const typeTag = isMain ? `<span class="tag">主险</span>` : `<span class="tag 附加险">附加险</span>`;
        const warnPolicy = !completePolicy ? `<span class="warning-tag">⚠️ 基本信息不完整</span>` : '';
        const errors = validatePolicyDetails(policy, client);
        let errorHtml = '';
        if (errors.length > 0) {
            errorHtml = `<div class="error-list">`;
            errors.forEach(err => { errorHtml += `<div class="err-item">❌ ${err}</div>`; });
            errorHtml += `</div>`;
        }
        const insuredName = policy.insured || '';
        let relationLabel = '', showAddBtn = false;
        if (insuredName) {
            const member = (client.familyMembers || []).find(m => m.name === insuredName);
            if (member) {
                relationLabel = member.relationship;
            } else if (insuredName !== client.name) {
                showAddBtn = true;
            }
        }
        const relationHtml = relationLabel ? `<span class="relation-tag">关系：${relationLabel}</span>` : '';
        const addBtnHtml = showAddBtn ? `<button class="link-btn" data-name="${client.name}" data-insured="${insuredName}" data-id="${policy.insuredId || ''}" data-phone="${policy.insuredPhone || ''}">➕关联</button>` : '';

        let beneHtml = '';
        if (policy.beneficiaries && policy.beneficiaries.length > 0) {
            const sum = policy.beneficiaries.reduce((s, b) => s + (b.quota || 0), 0);
            beneHtml = `<div class="row"><span class="field">受益人</span><span class="value">`;
            policy.beneficiaries.forEach((b, i) => {
                beneHtml += `${b.name}（${b.quota || 0}%）`;
                if (i < policy.beneficiaries.length - 1) beneHtml += '，';
            });
            if (sum !== 100) beneHtml += ` <span style="color:#b45309;">⚠️ 配额总和不等于100%</span>`;
            beneHtml += `</span></div>`;
        } else {
            beneHtml = `<div class="row"><span class="field">受益人</span><span class="value" style="color:#94a3b8;">未指定</span></div>`;
        }

        let html = `<div class="policy-item">`;
        html += `<div class="row"><span class="field">险种</span><span class="value">${policy.insuranceName || policy.mainType}</span> ${typeTag} ${statusTag} ${warnPolicy}</div>`;
        html += `<div class="row"><span class="field">保单代码</span><span class="value"><span class="policy-code">${policy.policyCode || '缺失'}</span></span></div>`;
        html += `<div class="row"><span class="field">险种代码</span><span class="value"><span class="policy-code">${policy.codeType || '无'}</span></span></div>`;
        if (policy.annualPremium) html += `<div class="row"><span class="field">年缴保费</span><span class="value highlight">${policy.annualPremium} 元</span> ${policy.paymentTerm ? '共 '+policy.paymentTerm+' 年' : ''}</div>`;
        else html += `<div class="row"><span class="field">年缴保费</span><span class="value" style="color:#b45309;">缺失</span></div>`;

        const effDate = policy.effectiveDate;
        if (effDate) {
            const formatted = formatDate(effDate);
            const elapsed = calculateElapsedYears(effDate);
            let statusText = '';
            if (elapsed !== null) statusText = `（自生效日起已存续 ${elapsed} 年）`;
            html += `<div class="row"><span class="field">生效日</span><span class="value">${formatted} ${statusText}</span></div>`;
        } else {
            html += `<div class="row"><span class="field">生效日</span><span class="value" style="color:#b45309;">缺失</span></div>`;
        }

        html += `<div class="row"><span class="field">被保险人</span><span class="value">${insuredName || '缺失'} ${relationHtml} ${addBtnHtml}</span></div>`;
        html += `<div class="row"><span class="field">被保人身份证</span><span class="value">${policy.insuredId || '缺失'}</span></div>`;
        html += `<div class="row"><span class="field">被保人手机</span><span class="value">${policy.insuredPhone || '缺失'}</span></div>`;
        html += `<div class="row"><span class="field">联系地址</span><span class="value">${client.address || '缺失'}</span></div>`;
        html += beneHtml;
        if (policy.remark) html += `<div class="row"><span class="field">备注</span><span class="value" style="font-size:12px;color:#64748b;">${policy.remark}</span></div>`;

        // 服务记录
        const records = policy.serviceRecords || [];
        html += `<div class="service-record">`;
        html += `<div style="font-weight:500;font-size:14px;margin-bottom:4px;">📝 服务记录</div>`;
        if (records.length === 0) {
            html += `<div style="font-size:13px;color:#94a3b8;">暂无服务记录</div>`;
        } else {
            const sorted = records.map((rec, i) => ({ ...rec, _origIdx: i }));
            sorted.reverse();
            sorted.forEach(rec => {
                const origIdx = rec._origIdx;
                html += `<div class="record-item">`;
                html += `<span class="date">${rec.date}</span>`;
                html += `<span class="content">${rec.content}</span>`;
                html += `<div class="rec-actions">`;
                html += `<button class="edit-service" data-name="${client.name}" data-policy="${idx}" data-record="${origIdx}">编辑</button>`;
                html += `<button class="del-service" data-name="${client.name}" data-policy="${idx}" data-record="${origIdx}">删除</button>`;
                html += `</div>`;
                html += `</div>`;
            });
        }
        html += `<div class="add-service">`;
        html += `<input class="service-input" placeholder="输入服务内容…">`;
        html += `<button class="service-add-btn" data-name="${client.name}" data-idx="${idx}">添加</button>`;
        html += `</div>`;
        html += `</div>`;

        if (errorHtml) html += errorHtml;
        if (policy.extraFields && Object.keys(policy.extraFields).length > 0) {
            for (let [key, val] of Object.entries(policy.extraFields)) {
                if (val) html += `<div class="row"><span class="field">${key}</span><span class="value" style="color:#2563eb;">${val}</span></div>`;
            }
        }
        if (idx !== -1) {
            html += `<div class="policy-actions">`;
            html += `<button class="edit-btn" data-name="${client.name}" data-index="${idx}">✏️ 编辑</button>`;
            html += `<button class="del-policy-btn" data-name="${client.name}" data-index="${idx}">🗑️ 删除</button>`;
            html += `</div>`;
        }
        html += `</div>`;
        return html;
    }

    // ----- 服务记录事件绑定 -----
    function bindServiceEvents() {
        detailContent.querySelectorAll('.service-add-btn').forEach(btn => {
            btn.removeEventListener('click', handleServiceAdd);
            btn.addEventListener('click', handleServiceAdd);
        });
        detailContent.querySelectorAll('.edit-service').forEach(btn => {
            btn.removeEventListener('click', handleEditService);
            btn.addEventListener('click', handleEditService);
        });
        detailContent.querySelectorAll('.del-service').forEach(btn => {
            btn.removeEventListener('click', handleDeleteService);
            btn.addEventListener('click', handleDeleteService);
        });
    }

    function handleServiceAdd(e) {
        const btn = e.currentTarget;
        const name = btn.dataset.name;
        const idx = parseInt(btn.dataset.idx);
        const input = btn.parentElement.querySelector('.service-input');
        const content = input.value.trim();
        if (!content) { alert('请输入服务内容'); return; }
        if (!confirm(`确认添加服务记录：“${content}”吗？`)) return;
        const client = getClient(name);
        if (!client) return;
        const policy = client.policies[idx];
        if (!policy) return;
        if (!policy.serviceRecords) policy.serviceRecords = [];
        const today = new Date().toISOString().slice(0,10);
        policy.serviceRecords.push({ date: today, content });
        saveData(currentData);
        renderDetail(name);
    }

    function handleEditService(e) {
        const btn = e.currentTarget;
        const name = btn.dataset.name;
        const policyIdx = parseInt(btn.dataset.policy);
        const recordIdx = parseInt(btn.dataset.record);
        const client = getClient(name);
        if (!client) return;
        const policy = client.policies[policyIdx];
        if (!policy || !policy.serviceRecords) return;
        const record = policy.serviceRecords[recordIdx];
        if (!record) return;
        const newContent = prompt(`修改服务记录（${record.date}）:`, record.content);
        if (newContent === null) return;
        const trimmed = newContent.trim();
        if (!trimmed) { alert('内容不能为空'); return; }
        if (!confirm(`确认将服务记录修改为：“${trimmed}”吗？`)) return;
        policy.serviceRecords[recordIdx].content = trimmed;
        saveData(currentData);
        renderDetail(name);
    }

    function handleDeleteService(e) {
        const btn = e.currentTarget;
        const name = btn.dataset.name;
        const policyIdx = parseInt(btn.dataset.policy);
        const recordIdx = parseInt(btn.dataset.record);
        const client = getClient(name);
        if (!client) return;
        const policy = client.policies[policyIdx];
        if (!policy || !policy.serviceRecords) return;
        const record = policy.serviceRecords[recordIdx];
        if (!record) return;
        if (!confirm(`确认删除服务记录：“${record.content}”（${record.date}）吗？`)) return;
        policy.serviceRecords.splice(recordIdx, 1);
        saveData(currentData);
        renderDetail(name);
    }

    // ----- 家庭成员管理 -----
    function openAddFamilyMember(name, prefill = {}) {
        const client = getClient(name);
        if (!client) { alert('客户数据不存在'); return; }
        if (!client.familyMembers) client.familyMembers = [];
        if (prefill.name && client.familyMembers.some(m => m.name === prefill.name)) {
            alert(`家庭成员中已有 "${prefill.name}"，请勿重复添加。`);
            return;
        }
        let html = `<h2>添加家庭成员</h2>`;
        html += `<label>姓名 *</label><input id="fmName" value="${prefill.name || ''}" placeholder="姓名">`;
        html += `<label>关系 *</label><select id="fmRelation"><option value="丈夫">丈夫</option><option value="妻子">妻子</option><option value="父亲">父亲</option><option value="母亲">母亲</option><option value="儿子">儿子</option><option value="女儿">女儿</option></select>`;
        html += `<label>身份证号</label><input id="fmIdCard" value="${prefill.idCard || ''}" placeholder="身份证号">`;
        html += `<label>联系电话</label><input id="fmPhone" value="${prefill.phone || ''}" placeholder="电话">`;
        html += `<label>备注</label><input id="fmNote" placeholder="备注（如：已退休）">`;
        if (prefill.name) html += `<p style="font-size:13px;color:#64748b;margin-top:4px;">💡 已根据保单预填信息，请选择关系后确认。</p>`;
        html += `<div class="btn-row"><button class="primary" id="saveFmBtn">添加</button><button class="secondary" id="cancelModalBtn">取消</button></div>`;
        openModal(html);
        document.getElementById('saveFmBtn').addEventListener('click', () => {
            const nameVal = document.getElementById('fmName').value.trim();
            const relation = document.getElementById('fmRelation').value;
            if (!nameVal) { alert('请输入姓名'); return; }
            if (client.familyMembers.some(m => m.name === nameVal)) { alert('已存在该成员'); return; }
            client.familyMembers.push({
                name: nameVal,
                relationship: relation,
                idCard: document.getElementById('fmIdCard').value.trim(),
                phone: document.getElementById('fmPhone').value.trim(),
                note: document.getElementById('fmNote').value.trim()
            });
            saveData(currentData);
            refreshData();
            closeModal();
            if (currentView === 'detail') renderDetail(name);
        });
        document.getElementById('cancelModalBtn').addEventListener('click', closeModal);
    }

    function openEditFamilyMember(name, index) {
        const client = getClient(name);
        if (!client) return;
        const member = client.familyMembers[index];
        if (!member) return;
        let html = `<h2>编辑家庭成员</h2>`;
        html += `<label>姓名 *</label><input id="fmName" value="${member.name}">`;
        html += `<label>关系 *</label><select id="fmRelation">`;
        ['丈夫','妻子','父亲','母亲','儿子','女儿'].forEach(r => {
            html += `<option value="${r}" ${member.relationship === r ? 'selected' : ''}>${r}</option>`;
        });
        html += `</select>`;
        html += `<label>身份证号</label><input id="fmIdCard" value="${member.idCard || ''}">`;
        html += `<label>联系电话</label><input id="fmPhone" value="${member.phone || ''}">`;
        html += `<label>备注</label><input id="fmNote" value="${member.note || ''}">`;
        html += `<div class="btn-row"><button class="primary" id="saveFmBtn">保存</button><button class="secondary" id="cancelModalBtn">取消</button></div>`;
        openModal(html);
        document.getElementById('saveFmBtn').addEventListener('click', () => {
            const nameVal = document.getElementById('fmName').value.trim();
            if (!nameVal) { alert('请输入姓名'); return; }
            member.name = nameVal;
            member.relationship = document.getElementById('fmRelation').value;
            member.idCard = document.getElementById('fmIdCard').value.trim();
            member.phone = document.getElementById('fmPhone').value.trim();
            member.note = document.getElementById('fmNote').value.trim();
            saveData(currentData);
            refreshData();
            closeModal();
            if (currentView === 'detail') renderDetail(name);
        });
        document.getElementById('cancelModalBtn').addEventListener('click', closeModal);
    }

    // ----- 编辑保单 -----
    function openEditPolicy(name, index) {
        const client = getClient(name);
        if (!client) return;
        const policy = client.policies[index];
        if (!policy) return;
        if (!policy.extraFields) policy.extraFields = {};
        if (!policy.beneficiaries) policy.beneficiaries = [];
        if (!policy.serviceRecords) policy.serviceRecords = [];
        const mainPolicies = client.policies.filter(p => p.mainType === '主险' && p.policyCode);

        let html = `<h2>编辑保单 - ${client.name}</h2>`;
        html += `<label>险种名称</label><input id="editPolicyName" value="${policy.insuranceName || ''}" placeholder="如 国寿防癌疾病保险">`;
        html += `<label>保单代码</label><input id="editPolicyCode" value="${policy.policyCode || ''}">`;
        html += `<label>险种代码</label><input id="editCodeType" value="${policy.codeType || ''}" placeholder="如 201744">`;
        html += `<label>主险/附加险</label><select id="editMainType"><option value="主险" ${policy.mainType === '主险' ? 'selected' : ''}>主险</option><option value="附加险" ${policy.mainType === '附加险' ? 'selected' : ''}>附加险</option></select>`;
        html += `<div id="parentPolicyGroup" style="${policy.mainType === '附加险' ? '' : 'display:none;'}">`;
        html += `<label><span class="required-star">*</span>关联主险（必选）</label>`;
        html += `<select id="editParentPolicy" style="border-color:#3b82f6;border-width:2px;">`;
        html += `<option value="">-- 请选择 --</option>`;
        mainPolicies.forEach(mp => {
            const selected = mp.policyCode === policy.parentPolicyCode ? 'selected' : '';
            html += `<option value="${mp.policyCode}" ${selected}>${mp.insuranceName || mp.policyCode} (${mp.policyCode})</option>`;
        });
        html += `</select>`;
        html += `<div style="font-size:12px;color:#64748b;margin-top:2px;">💡 附加险必须关联一个主险保单</div>`;
        html += `</div>`;
        html += `<label>保单状态</label><select id="editStatus"><option value="有效" ${policy.status === '有效' ? 'selected' : ''}>有效</option><option value="失效" ${policy.status === '失效' ? 'selected' : ''}>失效</option><option value="" ${policy.status === '' ? 'selected' : ''}>未知</option></select>`;

        html += `<label>年缴保费（元）</label><input id="editPremium" value="${policy.annualPremium || ''}" placeholder="金额">`;
        html += `<label>缴费期限（年）</label><input id="editTerm" value="${policy.paymentTerm || ''}" placeholder="年数">`;
        html += `<label>被保险人</label><input id="editInsured" value="${policy.insured || ''}" placeholder="姓名">`;
        html += `<label>被保人身份证</label><input id="editInsuredId" value="${policy.insuredId || ''}" placeholder="18位身份证">`;
        html += `<label>被保人手机</label><input id="editInsuredPhone" value="${policy.insuredPhone || ''}" placeholder="11位手机号">`;

        html += `<div style="margin-top:12px;border-top:1px solid #e2e8f0;padding-top:12px;">`;
        html += `<label style="font-weight:600;">受益人（配额总和必须为100%）</label>`;
        html += `<div id="beneficiariesContainer">`;
        if (policy.beneficiaries.length === 0) {
            html += `<div style="font-size:13px;color:#94a3b8;">暂无受益人</div>`;
        } else {
            policy.beneficiaries.forEach((b, idx) => {
                html += `<div class="beneficiary-row">`;
                html += `<input class="bene-name" value="${b.name}" placeholder="姓名">`;
                html += `<input class="bene-quota" value="${b.quota || 0}" placeholder="配额%" style="width:80px;">`;
                html += `<button class="del-bene-btn" data-idx="${idx}">删除</button>`;
                html += `</div>`;
            });
        }
        html += `</div>`;
        html += `<div class="beneficiary-row">`;
        html += `<input id="newBeneName" placeholder="姓名">`;
        html += `<input id="newBeneQuota" placeholder="配额%" style="width:80px;">`;
        html += `<button id="addBeneBtn" class="primary" style="background:#3b82f6;color:white;border:none;border-radius:20px;padding:2px 12px;cursor:pointer;">添加</button>`;
        html += `</div>`;
        html += `<div id="beneSummary" class="bene-summary">当前总和：${policy.beneficiaries.reduce((s,b) => s + (b.quota || 0), 0)}%</div>`;
        html += `</div>`;

        html += `<label>备注</label><textarea id="editRemark">${policy.remark || ''}</textarea>`;

        html += `<div class="extra-field-group">`;
        html += `<label style="font-weight:600;">📌 自定义字段</label>`;
        html += `<div style="margin-bottom:6px;">`;
        html += `<button class="preset-btn" data-preset="返还开始年">返还开始年</button>`;
        html += `<button class="preset-btn" data-preset="返还年限">返还年限</button>`;
        html += `<button class="preset-btn" data-preset="返还金额">返还金额</button>`;
        html += `</div>`;
        html += `<div id="extraFieldsContainer">`;
        const extraEntries = Object.entries(policy.extraFields);
        if (extraEntries.length === 0) {
            html += `<div style="font-size:13px;color:#94a3b8;">暂无自定义字段</div>`;
        } else {
            extraEntries.forEach(([key, val]) => {
                html += `<div class="field-row">`;
                html += `<input class="extra-key" value="${key}" placeholder="字段名">`;
                html += `<input class="extra-value" value="${val}" placeholder="值">`;
                html += `<button class="del-field-btn">删除</button>`;
                html += `</div>`;
            });
        }
        html += `</div>`;
        html += `<div class="field-row" id="newExtraFieldRow">`;
        html += `<input id="newExtraKey" placeholder="新字段名">`;
        html += `<input id="newExtraVal" placeholder="新值">`;
        html += `<button id="addExtraFieldBtn" class="primary" style="background:#3b82f6;color:white;border:none;border-radius:20px;padding:4px 12px;cursor:pointer;">添加</button>`;
        html += `</div>`;
        html += `</div>`;

        html += `<div class="btn-row"><button class="primary" id="saveEditPolicy">保存修改</button><button class="secondary" id="cancelModalBtn">取消</button></div>`;
        openModal(html);

        // 交互逻辑
        document.getElementById('editMainType').addEventListener('change', function() {
            const group = document.getElementById('parentPolicyGroup');
            if (this.value === '附加险') {
                group.style.display = 'block';
            } else {
                group.style.display = 'none';
            }
        });

        const beneContainer = document.getElementById('beneficiariesContainer');
        const addBeneBtn = document.getElementById('addBeneBtn');
        const newBeneName = document.getElementById('newBeneName');
        const newBeneQuota = document.getElementById('newBeneQuota');
        const beneSummary = document.getElementById('beneSummary');

        function updateBeneSummary() {
            const rows = beneContainer.querySelectorAll('.beneficiary-row');
            let total = 0;
            rows.forEach(row => {
                const quotaInput = row.querySelector('.bene-quota');
                const val = parseFloat(quotaInput.value) || 0;
                total += val;
            });
            beneSummary.textContent = `当前总和：${total}%`;
            if (total !== 100) {
                beneSummary.style.color = '#b45309';
                beneSummary.textContent += ' ⚠️ 配额总和不等于100%';
            } else {
                beneSummary.style.color = '#64748b';
            }
        }

        beneContainer.querySelectorAll('.del-bene-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const row = this.closest('.beneficiary-row');
                row.remove();
                updateBeneSummary();
            });
        });
        beneContainer.querySelectorAll('.bene-name, .bene-quota').forEach(input => {
            input.addEventListener('change', updateBeneSummary);
            input.addEventListener('input', updateBeneSummary);
        });

        addBeneBtn.addEventListener('click', function() {
            const name = newBeneName.value.trim();
            const quota = parseFloat(newBeneQuota.value);
            if (!name) { alert('请输入受益人姓名'); return; }
            if (isNaN(quota) || quota < 0 || quota > 100) { alert('请输入有效的配额（0-100）'); return; }
            const existing = beneContainer.querySelectorAll('.bene-name');
            for (let inp of existing) {
                if (inp.value.trim() === name) {
                    alert('受益人姓名已存在');
                    return;
                }
            }
            const row = document.createElement('div');
            row.className = 'beneficiary-row';
            row.innerHTML = `
                <input class="bene-name" value="${name}" placeholder="姓名">
                <input class="bene-quota" value="${quota}" placeholder="配额%" style="width:80px;">
                <button class="del-bene-btn">删除</button>
            `;
            beneContainer.appendChild(row);
            row.querySelector('.del-bene-btn').addEventListener('click', function() {
                row.remove();
                updateBeneSummary();
            });
            row.querySelectorAll('.bene-name, .bene-quota').forEach(input => {
                input.addEventListener('change', updateBeneSummary);
                input.addEventListener('input', updateBeneSummary);
            });
            newBeneName.value = '';
            newBeneQuota.value = '';
            updateBeneSummary();
            const placeholder = beneContainer.querySelector('div[style*="color:#94a3b8;"]');
            if (placeholder) placeholder.remove();
        });

        const extraContainer = document.getElementById('extraFieldsContainer');
        const addExtraBtn = document.getElementById('addExtraFieldBtn');
        const newExtraKey = document.getElementById('newExtraKey');
        const newExtraVal = document.getElementById('newExtraVal');
        document.querySelectorAll('.preset-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                newExtraKey.value = btn.dataset.preset;
                newExtraVal.focus();
            });
        });
        addExtraBtn.addEventListener('click', function() {
            const key = newExtraKey.value.trim();
            const val = newExtraVal.value.trim();
            if (!key || !val) { alert('请完整填写字段名和值'); return; }
            const existingKeys = extraContainer.querySelectorAll('.extra-key');
            for (let inp of existingKeys) {
                if (inp.value.trim() === key) {
                    alert('该字段已存在，请直接修改值或删除后重新添加。');
                    return;
                }
            }
            const row = document.createElement('div');
            row.className = 'field-row';
            row.innerHTML = `
                <input class="extra-key" value="${key}" placeholder="字段名">
                <input class="extra-value" value="${val}" placeholder="值">
                <button class="del-field-btn">删除</button>
            `;
            extraContainer.appendChild(row);
            row.querySelector('.del-field-btn').addEventListener('click', function() {
                row.remove();
                if (extraContainer.querySelectorAll('.field-row').length === 0) {
                    extraContainer.innerHTML = `<div style="font-size:13px;color:#94a3b8;">暂无自定义字段</div>`;
                }
            });
            newExtraKey.value = '';
            newExtraVal.value = '';
            const placeholder = extraContainer.querySelector('div[style*="color:#94a3b8;"]');
            if (placeholder) placeholder.remove();
        });
        extraContainer.querySelectorAll('.del-field-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const row = this.closest('.field-row');
                row.remove();
                if (extraContainer.querySelectorAll('.field-row').length === 0) {
                    extraContainer.innerHTML = `<div style="font-size:13px;color:#94a3b8;">暂无自定义字段</div>`;
                }
            });
        });

        document.getElementById('saveEditPolicy').addEventListener('click', () => {
            const beneRows = beneContainer.querySelectorAll('.beneficiary-row');
            const beneficiaries = [];
            let totalQuota = 0;
            beneRows.forEach(row => {
                const name = row.querySelector('.bene-name').value.trim();
                const quota = parseFloat(row.querySelector('.bene-quota').value) || 0;
                if (name) {
                    beneficiaries.push({ name, quota });
                    totalQuota += quota;
                }
            });
            if (beneficiaries.length > 0 && totalQuota !== 100) {
                alert(`受益人配额总和为 ${totalQuota}%，必须等于100%`);
                return;
            }

            const extraFields = {};
            const extraRows = extraContainer.querySelectorAll('.field-row');
            extraRows.forEach(row => {
                const keyInput = row.querySelector('.extra-key');
                const valInput = row.querySelector('.extra-value');
                if (keyInput && valInput) {
                    const k = keyInput.value.trim();
                    const v = valInput.value.trim();
                    if (k && v) extraFields[k] = v;
                }
            });

            const mainType = document.getElementById('editMainType').value;
            let parentPolicyCode = '';
            if (mainType === '附加险') {
                parentPolicyCode = document.getElementById('editParentPolicy').value;
                if (!parentPolicyCode) {
                    alert('附加险必须关联一个主险');
                    return;
                }
            }

            const updated = {
                policyCode: document.getElementById('editPolicyCode').value.trim(),
                insuranceName: document.getElementById('editPolicyName').value.trim(),
                codeType: document.getElementById('editCodeType').value.trim(),
                mainType: mainType,
                parentPolicyCode: parentPolicyCode,
                status: document.getElementById('editStatus').value,
                effectiveDate: document.getElementById('editEffective').value.trim(),
                paymentMethod: document.getElementById('editPayment').value.trim() || '年缴',
                annualPremium: document.getElementById('editPremium').value.trim(),
                paymentTerm: document.getElementById('editTerm').value.trim(),
                insured: document.getElementById('editInsured').value.trim(),
                insuredId: document.getElementById('editInsuredId').value.trim(),
                insuredPhone: document.getElementById('editInsuredPhone').value.trim(),
                beneficiaries: beneficiaries,
                remark: document.getElementById('editRemark').value.trim(),
                extraFields: extraFields,
                serviceRecords: policy.serviceRecords || []
            };
            if (!updated.insuranceName && !updated.policyCode) {
                alert('请至少填写险种名称或保单代码');
                return;
            }
            client.policies[index] = updated;
            saveData(currentData);
            refreshData();
            closeModal();
            if (currentView === 'detail') renderDetail(client.name);
        });
        document.getElementById('cancelModalBtn').addEventListener('click', closeModal);
        updateBeneSummary();
    }

    function deletePolicy(name, index) {
        const client = getClient(name);
        if (!client) return;
        client.policies.splice(index, 1);
        saveData(currentData);
        refreshData();
        if (currentView === 'detail') renderDetail(name);
    }

    // ----- 管理后台 -----
    function renderAdmin() {
        if (currentData.length === 0) {
            adminClientList.innerHTML = `
                <div class="no-result">
                    <div>📭 暂无客户数据</div>
                    <div class="sub">您可以通过「导入表格」从 Excel 恢复，或「恢复JSON」从备份恢复，也可以「新增客户」开始录入。</div>
                </div>
            `;
            return;
        }
        let html = '';
        currentData.forEach(c => {
            const age = calculateAge(c.idCard);
            const ageStr = age !== null ? `年龄 ${age} 岁` : '';
            html += `<div class="client-item">`;
            html += `<div class="info"><div class="name">${c.name}</div>`;
            html += `<div class="detail">保单 ${c.policies.length} 份 · 家庭成员 ${(c.familyMembers||[]).length} 人 · ${c.phone || '无电话'} ${ageStr}</div></div>`;
            html += `<div class="actions">`;
            html += `<button class="edit" data-name="${c.name}" data-action="editClient">编辑</button>`;
            html += `<button class="del" data-name="${c.name}" data-action="delClient">删除</button>`;
            html += `<button class="edit" data-name="${c.name}" data-action="addPolicy">➕保单</button>`;
            html += `</div></div>`;
        });
        adminClientList.innerHTML = html;
        adminClientList.querySelectorAll('[data-action="editClient"]').forEach(btn => btn.addEventListener('click', () => openEditClient(btn.dataset.name)));
        adminClientList.querySelectorAll('[data-action="delClient"]').forEach(btn => btn.addEventListener('click', () => {
            const name = btn.dataset.name;
            const confirmText = prompt(`请输入 "确认删除" 以确认删除客户 "${name}" 及其所有数据：`);
            if (confirmText === '确认删除') {
                deleteClient(name);
            } else {
                alert('删除已取消');
            }
        }));
        adminClientList.querySelectorAll('[data-action="addPolicy"]').forEach(btn => btn.addEventListener('click', () => openAddPolicy(btn.dataset.name)));
    }

    // ----- 模态框 -----
    function openModal(html) {
        modalBody.innerHTML = html;
        modalOverlay.classList.add('active');
    }
    function closeModal() { modalOverlay.classList.remove('active'); }
    modalClose.addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });

    // ----- 编辑客户 -----
    function openEditClient(name) {
        const client = getClient(name);
        if (!client) return;
        let html = `<h2>编辑客户</h2><label>投保人姓名 *</label><input id="editName" value="${client.name}">`;
        html += `<label>身份证号</label><input id="editIdCard" value="${client.idCard || ''}">`;
        html += `<label>联系电话</label><input id="editPhone" value="${client.phone || ''}">`;
        html += `<label>通信地址</label><textarea id="editAddress">${client.address || ''}</textarea>`;
        html += `<div class="btn-row"><button class="primary" id="saveClientBtn">保存</button><button class="secondary" id="cancelModalBtn">取消</button></div>`;
        openModal(html);
        document.getElementById('saveClientBtn').addEventListener('click', () => {
            const newName = document.getElementById('editName').value.trim();
            if (!newName) { alert('姓名不能为空'); return; }
            if (newName !== name && currentData.some(c => c.name === newName)) { alert('该姓名已存在'); return; }
            client.name = newName;
            client.idCard = document.getElementById('editIdCard').value.trim();
            client.phone = document.getElementById('editPhone').value.trim();
            client.address = document.getElementById('editAddress').value.trim();
            saveData(currentData);
            refreshData();
            closeModal();
            if (currentView === 'detail' && currentDetailName === name) {
                currentDetailName = newName;
                renderDetail(newName);
            }
        });
        document.getElementById('cancelModalBtn').addEventListener('click', closeModal);
    }

    function deleteClient(name) {
        currentData = currentData.filter(c => c.name !== name);
        saveData(currentData);
        refreshData();
        if (currentView === 'detail' && currentDetailName === name) switchView('list');
    }

    function openAddClient() {
        let html = `<h2>新增客户</h2><label>投保人姓名 *</label><input id="newName" placeholder="姓名">`;
        html += `<label>身份证号</label><input id="newIdCard">`;
        html += `<label>联系电话</label><input id="newPhone">`;
        html += `<label>通信地址</label><textarea id="newAddress"></textarea>`;
        html += `<div class="btn-row"><button class="primary" id="confirmAddClient">创建</button><button class="secondary" id="cancelModalBtn">取消</button></div>`;
        openModal(html);
        document.getElementById('confirmAddClient').addEventListener('click', () => {
            const name = document.getElementById('newName').value.trim();
            if (!name) { alert('姓名不能为空'); return; }
            if (currentData.some(c => c.name === name)) { alert('该姓名已存在'); return; }
            currentData.push({
                name,
                idCard: document.getElementById('newIdCard').value.trim(),
                phone: document.getElementById('newPhone').value.trim(),
                address: document.getElementById('newAddress').value.trim(),
                policies: [],
                familyMembers: [],
                contactHistory: []
            });
            saveData(currentData);
            refreshData();
            closeModal();
        });
        document.getElementById('cancelModalBtn').addEventListener('click', closeModal);
    }

        html += `<label>生效日</label><input id="newEffective" placeholder="YYYYMMDD">`;
        html += `<label>缴费方式</label><input id="newPayment" value="年缴">`;
        html += `<label>年缴保费（元）</label><input id="newPremium" placeholder="金额">`;
        html += `<label>缴费期限（年）</label><input id="newTerm" placeholder="年数">`;
        html += `<label>被保险人</label><input id="newInsured" placeholder="姓名">`;
        html += `<label>被保人身份证</label><input id="newInsuredId" placeholder="18位身份证">`;
        html += `<label>被保人手机</label><input id="newInsuredPhone" placeholder="11位手机号">`;
        html += `<label>备注</label><textarea id="newRemark"></textarea>`;

        openModal(html);

        document.getElementById('newMainType').addEventListener('change', function() {
            const group = document.getElementById('newParentGroup');
            if (this.value === '附加险') {
                group.style.display = 'block';
            } else {
                group.style.display = 'none';
            }
        });

        document.getElementById('confirmAddPolicy').addEventListener('click', () => {
            const mainType = document.getElementById('newMainType').value;
            let parentPolicyCode = '';
            if (mainType === '附加险') {
                parentPolicyCode = document.getElementById('newParentPolicy').value;
                if (!parentPolicyCode) {
                    alert('附加险必须关联一个主险');
                    return;
                }
            }
            const policy = {
                policyCode: document.getElementById('newPolicyCode').value.trim(),
                insuranceName: document.getElementById('newPolicyName').value.trim(),
                codeType: document.getElementById('newCodeType').value.trim(),
                mainType: mainType,
                parentPolicyCode: parentPolicyCode,
                status: document.getElementById('newStatus').value,
                effectiveDate: document.getElementById('newEffective').value.trim(),

                annualPremium: document.getElementById('newPremium').value.trim(),
                paymentTerm: document.getElementById('newTerm').value.trim(),
                insured: document.getElementById('newInsured').value.trim(),

                insuredPhone: document.getElementById('newInsuredPhone').value.trim(),
                beneficiaries: [],
                remark: document.getElementById('newRemark').value.trim(),

            };

            client.policies.push(policy);
            saveData(currentData);
            refreshData();
            closeModal();
        });
        document.getElementById('cancelModalBtn').addEventListener('click', closeModal);
