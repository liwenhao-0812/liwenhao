                            html += `<tr><th colspan="2">主险：${mp.insuranceName || mp.mainType}</th></tr>`;
                            html += `<tr><td class="label">保单代码</td><td>${mp.policyCode || '缺失'}</td></tr>`;
                            html += `<tr><td class="label">险种代码</td><td>${mp.codeType || '无'}</td></tr>`;
                            html += `<tr><td class="label">状态</td><td>${mp.status || '未知'}</td></tr>`;
                            html += `<tr><td class="label">生效日</td><td>${formatDate(mp.effectiveDate)} ${mp.effectiveDate ? '（自生效日起已存续 ' + calculateElapsedYears(mp.effectiveDate) + ' 年）' : ''}</td></tr>`;
                            html += `<tr><td class="label">年缴保费</td><td>${mp.annualPremium || '未填写'} 元${mp.paymentTerm ? '（共 '+mp.paymentTerm+' 年）' : ''}</td></tr>`;
                            html += `<tr><td class="label">被保险人</td><td>${mp.insured || '未指定'} ${mp.insuredId ? '（身份证：'+mp.insuredId+'）' : ''} ${mp.insuredPhone ? '（手机：'+mp.insuredPhone+'）' : ''}</td></tr>`;
                            html += `<tr><td class="label">受益人</td><td>${mp.beneficiaries && mp.beneficiaries.length > 0 ? mp.beneficiaries.map(b => b.name+'（'+b.quota+'%）').join('、') : '未指定'}</td></tr>`;
                            if (mp.remark) html += `<tr><td class="label">备注</td><td>${mp.remark}</td></tr>`;
                            if (mp.extraFields && Object.keys(mp.extraFields).length > 0) {
                                html += `<tr><td class="label">自定义字段</td><td>${Object.entries(mp.extraFields).map(([k,v]) => k+'：'+v).join('；')}</td></tr>`;
                            }
                            if (mp.serviceRecords && mp.serviceRecords.length > 0) {
                                html += `<tr><td class="label">服务记录</td><td>${mp.serviceRecords.map(s => s.date+'：'+s.content).join('；')}</td></tr>`;
                            }
                            html += `</table>`;
                            if (subs.length > 0) {
                                html += `<div style="margin-left:20px; border-left:2px solid #94a3b8; padding-left:10px; margin-top:6px;">`;
                                subs.forEach(sp => {
                                    html += `<table class="policy-table" style="margin-top:6px;">`;
                                    html += `<tr><th colspan="2">附加险：${sp.insuranceName || sp.mainType}</th></tr>`;
                                    html += `<tr><td class="label">保单代码</td><td>${sp.policyCode || '缺失'}</td></tr>`;
                                    html += `<tr><td class="label">险种代码</td><td>${sp.codeType || '无'}</td></tr>`;
                                    html += `<tr><td class="label">状态</td><td>${sp.status || '未知'}</td></tr>`;
                                    html += `<tr><td class="label">生效日</td><td>${formatDate(sp.effectiveDate)} ${sp.effectiveDate ? '（自生效日起已存续 ' + calculateElapsedYears(sp.effectiveDate) + ' 年）' : ''}</td></tr>`;
                                    html += `<tr><td class="label">年缴保费</td><td>${sp.annualPremium || '未填写'} 元${sp.paymentTerm ? '（共 '+sp.paymentTerm+' 年）' : ''}</td></tr>`;
                                    html += `<tr><td class="label">被保险人</td><td>${sp.insured || '未指定'} ${sp.insuredId ? '（身份证：'+sp.insuredId+'）' : ''} ${sp.insuredPhone ? '（手机：'+sp.insuredPhone+'）' : ''}</td></tr>`;
                                    html += `<tr><td class="label">受益人</td><td>${sp.beneficiaries && sp.beneficiaries.length > 0 ? sp.beneficiaries.map(b => b.name+'（'+b.quota+'%）').join('、') : '未指定'}</td></tr>`;
                                    if (sp.remark) html += `<tr><td class="label">备注</td><td>${sp.remark}</td></tr>`;
                                    if (sp.extraFields && Object.keys(sp.extraFields).length > 0) {
                                        html += `<tr><td class="label">自定义字段</td><td>${Object.entries(sp.extraFields).map(([k,v]) => k+'：'+v).join('；')}</td></tr>`;
                                    }
                                    if (sp.serviceRecords && sp.serviceRecords.length > 0) {
                                        html += `<tr><td class="label">服务记录</td><td>${sp.serviceRecords.map(s => s.date+'：'+s.content).join('；')}</td></tr>`;
                                    }
                                    html += `</table>`;
                                });
                                html += `</div>`;
                            }
                            html += `</div>`;
                        });
                        // 未关联主险的附加险
                        const orphanSubs = subPols.filter(sp => !sp.parentPolicyCode || !mainPols.some(mp => mp.policyCode === sp.parentPolicyCode));
                        if (orphanSubs.length > 0) {
                            html += `<div style="margin-top:12px; border:1px solid #f59e0b; padding:8px; background:#fef3c7;">`;
                            html += `<p style="font-weight:600; color:#b45309;">⚠️ 未关联主险的附加险：</p>`;
                            orphanSubs.forEach(sp => {
                                html += `<table class="policy-table" style="margin-top:6px;">`;
                                html += `<tr><th colspan="2">附加险（未关联）</th></tr>`;
                                html += `<tr><td class="label">险种名称</td><td>${sp.insuranceName || sp.mainType}</td></tr>`;
                                html += `<tr><td class="label">保单代码</td><td>${sp.policyCode || '缺失'}</td></tr>`;
                                html += `<tr><td class="label">状态</td><td>${sp.status || '未知'}</td></tr>`;
                                html += `<tr><td class="label">年缴保费</td><td>${sp.annualPremium || '未填写'} 元</td></tr>`;
                                html += `<tr><td class="label">生效日</td><td>${formatDate(sp.effectiveDate)}</td></tr>`;
                                html += `</table>`;
                            });
                            html += `</div>`;
                        }
                        return html;
                    })() : '<p>暂无保单</p>'}
                </div>

                <div class="footer">—— 本文件由保单管理系统生成 ——</div>
            </body></html>`;

            const blob = new Blob([htmlContent], { type: 'application/msword;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${client.name}_保单信息.doc`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // ============================================================
        // 云端事件绑定（同 v27）
        // ============================================================
        document.getElementById('cloudEnableBtn').addEventListener('click', function() {
            const binId = document.getElementById('cloudBinId').value.trim();
            const secret = document.getElementById('cloudSecretKey').value.trim();
            if (!binId || !secret) { alert('请完整填写 Bin ID 和 Secret Key'); return; }
            saveCloudConfig(binId, secret);
            const currentData = loadData();
            if (currentData.length > 0) {
                syncToCloud(currentData).then(success => {
                    if (success) alert('✅ 启用成功，数据已同步到云端。');
                    else { alert('⚠️ 连接失败，请检查 Bin ID 和 Secret Key 是否正确。'); clearCloudConfig(); }
                });
            } else {
                fetchFromCloud().then(data => {
                    if (data && Array.isArray(data) && data.length > 0) {
                        if (confirm(`云端有 ${data.length} 位客户，是否加载到本地？`)) {
                            saveData(data);
                            refreshData();
                            alert('✅ 已加载云端数据。');
                        }
                    } else {
                        alert('✅ 已启用云端备份，当前云端无数据，后续修改将自动上传。');
                    }
                });
            }
        });

        document.getElementById('cloudSyncBtn').addEventListener('click', function() {
            const currentData = loadData();
            if (currentData.length === 0) { alert('本地无数据，请先录入数据或从云端恢复。'); return; }
            const binId = localStorage.getItem(CLOUD_BIN_KEY);
            const secret = localStorage.getItem(CLOUD_SECRET_KEY);
            if (!binId || !secret) { alert('请先配置 Bin ID 和 Secret Key。'); return; }
            if (!cloudEnabled) { cloudEnabled = true; updateCloudStatusUI(true); }
            syncToCloud(currentData).then(success => {
                if (success) alert('✅ 手动同步成功！');
                else alert('❌ 同步失败，请检查网络或配置。');
            });
        });

        document.getElementById('homeSyncBtn').addEventListener('click', async function() {
            const btn = this;
            btn.textContent = '⏳ 同步中...';
            btn.disabled = true;
            try {
                const success = await pullFromCloud();
                if (success) renderList();
            } catch (e) { alert('同步出错：' + e.message); }
            finally { btn.textContent = '🔄 同步'; btn.disabled = false; }
        });

        // ============================================================
        // 下载模板
        // ============================================================
        document.getElementById('downloadTemplateBtn').addEventListener('click', downloadTemplate);

        // ============================================================
        // 原有事件绑定
        // ============================================================
        switchBtn.addEventListener('click', () => {
            if (currentView === 'admin') switchView('list');
            else switchView('admin');
        });

        backToListBtn.addEventListener('click', () => {
            if (currentView === 'detail' || currentView === 'admin') window.history.back();
        });

        backToListFromAdmin.addEventListener('click', () => {
            if (currentView === 'admin') window.history.back();
        });

        searchInput.addEventListener('input', () => { if (currentView === 'list') renderList(); });

        document.getElementById('addClientBtn').addEventListener('click', openAddClient);
        document.getElementById('importDataBtn').addEventListener('click', openImportModal);
        document.getElementById('exportDataBtn').addEventListener('click', exportData);
        document.getElementById('restoreDataBtn').addEventListener('click', restoreFromJSON);
        document.getElementById('linkFileBtn').addEventListener('click', linkFile);
        document.getElementById('refreshAdminBtn').addEventListener('click', refreshData);

        // ============================================================
        // 启动应用
        // ============================================================
        function startApp() {
            updateFooterTime();
            loadCloudConfig();

            if (cloudEnabled) {
                const localData = loadData();
                if (localData.length === 0) {
                    fetchFromCloud().then(data => {
                        if (data && Array.isArray(data) && data.length > 0) {
                            if (confirm(`云端有 ${data.length} 位客户数据，是否加载到本地？`)) {
                                saveData(data);
                                refreshData();
                            }
                        }
                    });
                } else {
                    fetchFromCloud().then(data => {
                        if (data && Array.isArray(data) && data.length > 0) {
                            if (data.length !== localData.length) {
                                if (confirm(`云端有 ${data.length} 位客户，本地有 ${localData.length} 位客户。是否从云端加载最新数据？`)) {
                                    saveData(data);
                                    refreshData();
                                }
                            } else {
                                if (confirm('云端数据与本地数量相同，是否强制从云端加载最新数据？')) {
                                    saveData(data);
                                    refreshData();
                                }
                            }
                        }
                    });
                }
            }

            if (currentData.length === 0) {
                switchView('admin');
                adminClientList.innerHTML = `
                    <div class="no-result">
                        <div>📭 暂无数据</div>
                        <div class="sub">您可以通过「导入表格」从 Excel 恢复，或「恢复JSON」从备份恢复，也可以「新增客户」开始录入。</div>
                    </div>
                `;
            } else {
                initHistory();
            }
        }

        if (document.getElementById('appContent').style.display !== 'none') {
            if (typeof startApp === 'function') startApp();
        }
    </script>
</body>
</html>
