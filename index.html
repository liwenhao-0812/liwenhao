    // ----- 导入表格 -----
    function openImportModal() {
        let html = `<h2>📥 导入表格数据</h2>`;
        html += `<p style="font-size:14px;color:#64748b;margin-bottom:10px;">请将从Excel复制的表格文本（<strong>必须包含表头</strong>）粘贴到下方：</p>`;
        html += `<textarea id="importTextArea" placeholder="粘贴竖线分隔的表格数据..." style="min-height:200px;"></textarea>`;
        html += `<div class="preview-box" id="importPreview">等待解析...</div>`;
        html += `<div class="btn-row"><button class="primary" id="confirmImport">导入（覆盖当前数据）</button><button class="secondary" id="cancelModalBtn">取消</button></div>`;
        openModal(html);

        const textarea = document.getElementById('importTextArea');
        const preview = document.getElementById('importPreview');

        textarea.addEventListener('input', function() {
            try {
                const raw = this.value;
                if (!raw.trim()) { preview.textContent = '等待粘贴数据...'; return; }
                const customers = importDataFromText(raw);
                preview.textContent = `✅ 解析成功：${customers.length} 位客户，总保单 ${customers.reduce((s,c) => s + c.policies.length, 0)} 条。`;
            } catch(e) {
                preview.textContent = '❌ ' + e.message;
            }
        });

        document.getElementById('confirmImport').addEventListener('click', () => {
            const raw = document.getElementById('importTextArea').value;
            if (!raw.trim()) { alert('请粘贴数据'); return; }
            try {
                const imported = importDataFromText(raw);
                if (imported.length === 0) { alert('未解析到有效数据'); return; }
                if (!confirm(`将导入 ${imported.length} 位客户，当前数据将被覆盖，确定吗？`)) return;
                saveData(imported);
                refreshData();
                closeModal();
                alert(`✅ 成功导入 ${imported.length} 位客户，共 ${imported.reduce((s,c) => s + c.policies.length, 0)} 条保单！`);
                switchView('list');
            } catch(e) {
                alert('导入失败：' + e.message);
            }
        });
        document.getElementById('cancelModalBtn').addEventListener('click', closeModal);
    }

    // ----- 导出JSON -----
    function exportData() {
        if (currentData.length === 0) { alert('当前没有数据可导出。'); return; }
        const dataStr = JSON.stringify(currentData, null, 2);
        const blob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `保单备份_${new Date().toISOString().slice(0,10)}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        alert('📤 导出成功！文件已下载，请妥善保存。');
    }

    // ----- 恢复JSON -----
    function restoreFromJSON() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.style.display = 'none';
        document.body.appendChild(input);
        input.click();
        input.addEventListener('change', function(e) {
            const file = this.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    const data = JSON.parse(ev.target.result);
                    if (!Array.isArray(data)) { alert('无效的备份文件：数据不是数组格式。'); return; }
                    if (data.length > 0 && (!data[0].name || !data[0].policies)) {
                        alert('备份文件格式不正确，缺少 "name" 或 "policies" 字段。');
                        return;
                    }
                    if (!confirm(`将恢复 ${data.length} 位客户，当前数据将被覆盖，确定吗？`)) return;
                    saveData(data);
                    refreshData();
                    alert(`✅ 恢复成功！共 ${data.length} 位客户。`);
                    switchView('list');
                } catch(err) {
                    alert('读取备份文件失败：' + err.message);
                }
            };
            reader.readAsText(file);
            document.body.removeChild(input);
        });
        input.addEventListener('cancel', function() {
            document.body.removeChild(input);
        });
    }

    // ============================================================
    // 云端事件绑定
    // ============================================================
    document.getElementById('cloudEnableBtn').addEventListener('click', function() {
        const binId = document.getElementById('cloudBinId').value.trim();
        const secret = document.getElementById('cloudSecretKey').value.trim();
        if (!binId || !secret) {
            alert('请完整填写 Bin ID 和 Secret Key');
            return;
        }
        saveCloudConfig(binId, secret);
        const currentData = loadData();
        if (currentData.length > 0) {
            syncToCloud(currentData).then(success => {
                if (success) {
                    alert('✅ 启用成功，数据已同步到云端。');
                } else {
                    alert('⚠️ 连接失败，请检查 Bin ID 和 Secret Key 是否正确。');
                    clearCloudConfig();
                }
            });
        } else {
            fetchFromCloud().then(data => {
                if (data && Array.isArray(data) && data.length > 0) {
                    if (confirm(`云端有 ${data.length} 位客户，是否加载到本地？`)) {
                        saveData(data);
                        refreshData();
                        alert('✅ 已加载云端数据。');
                    }
                } else {
                    alert('✅ 已启用云端备份，当前云端无数据，后续修改将自动上传。');
                }
            });
        }
    });

        document.getElementById('cloudSyncBtn').addEventListener('click', function() {
        const currentData = loadData();
        if (currentData.length === 0) {
            alert('本地无数据，请先录入数据或从云端恢复。');
            return;
        }
        // 检查配置是否存在
        const binId = localStorage.getItem(CLOUD_BIN_KEY);
        const secret = localStorage.getItem(CLOUD_SECRET_KEY);
        if (!binId || !secret) {
            alert('请先配置 Bin ID 和 Secret Key。');
            return;
        }
        // 启用云端（如果未启用）
        if (!cloudEnabled) {
            cloudEnabled = true;
            updateCloudStatusUI(true);
        }
        syncToCloud(currentData).then(success => {
            if (success) {
                alert('✅ 手动同步成功！');
            } else {
                alert('❌ 同步失败，请检查网络或配置。');
            }
        });
    });

    // ============================================================
    // 原有事件绑定（保留）
    // ============================================================
    switchBtn.addEventListener('click', () => {
        if (currentView === 'admin') switchView('list');
        else switchView('admin');
    });

    backToListBtn.addEventListener('click', () => {
        if (currentView === 'detail' || currentView === 'admin') window.history.back();
    });

    backToListFromAdmin.addEventListener('click', () => {
        if (currentView === 'admin') window.history.back();
    });

    searchInput.addEventListener('input', () => { if (currentView === 'list') renderList(); });

    document.getElementById('addClientBtn').addEventListener('click', openAddClient);
    document.getElementById('importDataBtn').addEventListener('click', openImportModal);
    document.getElementById('exportDataBtn').addEventListener('click', exportData);
    document.getElementById('restoreDataBtn').addEventListener('click', restoreFromJSON);
    document.getElementById('linkFileBtn').addEventListener('click', linkFile);
    document.getElementById('refreshAdminBtn').addEventListener('click', refreshData);

    // ============================================================
    // 初始化
    // ============================================================
    // 更新底部时间
    updateFooterTime();

    // 加载云端配置
    loadCloudConfig();

    // 自动同步（从云端拉取）
    autoSyncOnLoad();

    // 根据数据情况初始化视图
    if (currentData.length === 0) {
        switchView('admin');
        adminClientList.innerHTML = `
            <div class="no-result">
                <div>📭 暂无数据</div>
                <div class="sub">您可以通过「导入表格」从 Excel 恢复，或「恢复JSON」从备份恢复，也可以「新增客户」开始录入。</div>
            </div>
        `;
    } else {
        initHistory();
    }
</script>
</body>
